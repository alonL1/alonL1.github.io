- name: Community Compass (UW Capstone)
  stack: Not sure yet
  summary: >-
    A centralized platform designed to help homelessness service providers improve communication and increase material and financial donations.
  goals: >-
    The primary goal is to bridge the gap between service providers and the community by creating a user-friendly platform that increases the volume and efficiency of donations. By providing real-time transparency into the specific needs of shelters, we aim to heighten the level of service provided to the 34,000+ individuals experiencing homelessness in the King County area.
  role: >-
    As a Full-Stack Engineer and System Designer, I am responsible for architecting the platform's technical infrastructure and data management systems. Because our project is currently in the foundational phase, I have been deeply involved in initial stakeholder research and concept validation to ensure our system requirements align with the actual needs of local shelters.
  problem: >-
    Homelessness service providers currently operate within fragmented systems where data is often outdated or siloed across different organizations. This leads to unpredictable donation flows and significant resource gaps for shelters facing high demand. We identified an opportunity to replace these inefficient communication methods with a real-time "Compass" that guides donors to where their contributions are needed most.
  process: |-
    Our team, Emerald Way, followed an iterative research and design process:
    - Stakeholder Research: We pitched and validated our concepts with local organizations including Chief Seattle Club, Mary's Place, and Elizabeth Gregory Home.
    - Evidence-Based Design: We integrated research from the American Psychology Association and CMU regarding how donation tiers and donor-recipient details can increase engagement by 20%.
    - Core Concept Mapping: We designed a system centered on three core features: nonprofit-managed Wishlists, donor Search/Filter capabilities by location and priority, and direct Messaging channels for coordination.
  outcome: |-
    We developed a high-fidelity MVP prototype that includes a main search page for donors, a nonprofit dashboard for managing wishlists, and a messaging interface for drop-off coordination. Our next steps involve:
    - Conducting a second round of usability testing to ensure universal and intuitive design.
    - Moving into full application development and building out administrative tools for nonprofits.
    - Integrating impact transparency features to show donors the direct results of their contributions.
  takeaways:
    - "Psychological Engagement: Incorporating tiered donation suggestions and specific item details can significantly increase the impact of community support."
    - "Values-First Development: A system for high-need services must prioritize acceptance, authenticity, and inclusive language from the earliest design stages."
    - "Addressing Systemic Fragmentation: Building an effective coordination platform requires moving past siloed data to create a unified, reliable resource for the entire community."
  urls:
    - label: GitHub
      url: "https://github.com/AnantDH/INFO490-EmeraldWay"
    - label: Demo Video
      url: "https://www.youtube.com/watch?v=xFtxgH69nvo"
  image: /assets/images/projects/community-compass.svg

- name: Bowling Tracker App
  stack: React + Node.js + Computer Vision
  summary: A high-performance tracking app for the bowling community, featuring automated data entry and conversational analytics.
  goals: Remove manual score entry and provide bowlers with fast, visual performance insights.
  role: Lead developer responsible for the CV pipeline, API design, and analytics UI.
  problem: Bowlers track stats inconsistently, and manual entry slows adoption for casual leagues.
  process: Built a camera capture flow, trained a lightweight OCR pipeline, and designed a stats dashboard for session summaries.
  outcome: Achieved fast score entry on test devices; next steps include league integrations and a premium analytics tier.
  takeaways:
    - Automation only helps if the fallback manual flow is equally smooth.
    - Real-world lighting is the biggest challenge for CV accuracy.
  urls:
    - label: Live demo
      url: "https://bowling-tracker-six.vercel.app/"
    - label: GitHub
      url: "https://github.com/alonL1/bowling-tracker"
  image: /assets/images/projects/bowling-tracker.svg

- name: Guess That Bit
  stack: JavaScript + Web Audio
  summary: A game where players guess video clips from short audio snippets, built to maximize replay-ability and social sharing.
  goals: Create a quick, replayable web game that encourages friendly competition.
  role: Designer and engineer for the game logic, scoring, and engagement loop.
  problem: Most music-guessing games feel slow and lack social hooks for retention.
  process: Implemented a timed round system, built random clip selection, and tuned scoring to reward streaks.
  outcome: Playtests showed strong retention; next steps include a weekly leaderboard and user-created packs.
  takeaways:
    - Short rounds drive higher completion rates.
    - Clear scoring feedback keeps players engaged.
  urls:
    - label: Live demo
      url: "https://guessthatbit.com/"
    - label: GitHub
      url: "https://github.com/guyco3/key-and-peele-game"
  image: /assets/images/projects/guess-that-bit.svg

- name: Propper AI - DocGen
  stack: Node.js + Salesforce + AI
  summary: Developing an intelligent document generation engine that integrates with Salesforce to automate complex agreement workflows.
  goals: Reduce manual document prep time and standardize agreement templates across teams.
  role: Backend engineer focused on data mapping, template logic, and Salesforce integration.
  problem: Teams spend too much time assembling contracts and often copy outdated templates.
  process: Built a template rules engine, mapped CRM data to dynamic fields, and implemented validation checks.
  outcome: Automated core templates and reduced prep time in pilot tests; next steps include audit trails and role-based access.
  takeaways:
